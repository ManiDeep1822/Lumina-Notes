<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina | Notes</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --bg: #f1f5f9;
        --surface: rgba(255, 255, 255, 0.85);
        --text-main: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --danger: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        min-height: 100vh;
        color: var(--text-main);
      }

      .app-layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        min-height: 100vh;
      }

      /* -------- Sidebar -------- */

      aside {
        backdrop-filter: blur(20px);
        background: var(--surface);
        border-right: 1px solid rgba(255, 255, 255, 0.4);
        padding: 2.5rem;

        display: flex;
        flex-direction: column;
      }

      .logo {
        font-weight: 800;
        font-size: 1.6rem;
        color: var(--primary);
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      /* -------- Form Layout -------- */

      form {
        display: flex;
        flex-direction: column;
        flex: 1; /* allows textarea to push down */
      }

      .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 1.5rem;
      }

      .form-group label {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 0.75rem;
      }

      input,
      textarea {
        width: 100%;
        padding: 1rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        font-size: 0.95rem;
        transition: 0.2s ease;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        background: white;
      }

      /* -------- TEXTAREA FULL HEIGHT -------- */

      textarea {
        flex: 1; /* fills remaining space */
        resize: none;
        min-height: 150px;
      }

      /* Submit Button */
      input[type="submit"] {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 12px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        background: var(--primary);
        color: white;
        transition: 0.2s ease;
      }

      input[type="submit"]:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }

      /* -------- Main Content -------- */

      main {
        padding: 3rem;
      }

      .feed-header {
        margin-bottom: 2.5rem;
      }

      .feed-header h2 {
        font-size: 1.5rem;
        font-weight: 800;
      }

      .notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.75rem;
      }

      .note-card {
        background: white;
        padding: 1.75rem;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
      }

      .note-card h3 {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 1.25rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--border);
        word-break: break-word;
      }

      .note-card p {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin-bottom: 1.25rem;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .note-actions {
        display: flex;
        justify-content: space-between;
        margin-top: auto;
      }

      .btn-link {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--primary);
        text-decoration: none;
      }

      .btn-delete {
        background: none;
        border: none;
        color: var(--danger);
        font-weight: 600;
        cursor: pointer;
      }

      #toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        padding: 1rem 1.5rem;
        background: var(--text-main);
        color: white;
        border-radius: 14px;
        font-size: 0.85rem;
        display: none;
      }

      /* ============================= */
      /* RESPONSIVE DESIGN */
      /* ============================= */

      /* Tablet */
      @media (max-width: 1024px) {
        .app-layout {
          grid-template-columns: 300px 1fr;
        }

        main {
          padding: 2rem;
        }
      }

      /* Mobile */
      @media (max-width: 768px) {
        .app-layout {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: none;
          border-bottom: 1px solid var(--border);
          padding: 1.5rem;
        }

        main {
          padding: 1.5rem;
        }

        .notes-grid {
          grid-template-columns: 1fr;
        }

        textarea {
          min-height: 120px;
        }
      }

      /* Small Mobile */
      @media (max-width: 480px) {
        .logo {
          font-size: 1.3rem;
        }

        .feed-header h2 {
          font-size: 1.25rem;
        }

        input,
        textarea {
          padding: 0.85rem;
        }

        input[type="submit"] {
          padding: 0.85rem;
        }

        .note-card {
          padding: 1.25rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="app-layout">
      <aside>
        <div class="logo">📝 Lumina</div>

        <form id="form">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required />
          </div>

          <div class="form-group" style="flex: 1">
            <label for="content">Content</label>
            <textarea id="content" required></textarea>
          </div>

          <input type="submit" value="Create Note" />
        </form>
      </aside>

      <main>
        <div class="feed-header">
          <h2>Your Notes</h2>
        </div>
        <div id="displayNotes" class="notes-grid"></div>
      </main>
    </div>

    <div id="toast"></div>

    <script>
      const displayNotes = document.getElementById("displayNotes");
      const toast = document.getElementById("toast");
      const API_BASE = "http://localhost:3000/api";

      const showToast = (msg) => {
        toast.innerText = msg;
        toast.style.display = "block";
        setTimeout(() => {
          toast.style.display = "none";
        }, 2500);
      };

      const loadNotes = async () => {
        const res = await fetch(`${API_BASE}/notes`);
        const notes = await res.json();

        displayNotes.innerHTML = notes
          .map(
            (note) => `
                      <div class="note-card">
                        <h3>${note.title}</h3>
                        <p>${note.content}</p>
                        <div class="note-actions">
                          <a href="edit.html?id=${note._id}" class="btn-link">Edit</a>
                          <button class="btn-delete" onclick="deleteNote('${note._id}')">Delete</button>
                        </div>
                      </div>
                    `,
          )
          .join("");
      };

      const deleteNote = async (id) => {
        await fetch(`${API_BASE}/notes/${id}`, { method: "DELETE" });
        showToast("Note deleted");
        loadNotes();
      };

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        await fetch(`${API_BASE}/notes`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: document.getElementById("title").value,
            content: document.getElementById("content").value,
          }),
        });
        showToast("Note created");
        e.target.reset();
        loadNotes();
      });

      loadNotes();
    </script>
  </body>
</html>
